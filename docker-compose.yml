services:
  crm:
    build: .
    restart: unless-stopped
    environment:
      PORT: "8000"
      DATA_DIR: /data
      PLACETEL_SIP_DOMAIN: ${PLACETEL_SIP_DOMAIN:-sip.placetel.de}
      PLACETEL_WSS: ${PLACETEL_WSS:-wss://sip.placetel.de/ws}
      PLACETEL_USER_TYRONE: ${PLACETEL_USER_TYRONE:-}
      PLACETEL_PASS_TYRONE: ${PLACETEL_PASS_TYRONE:-}
      PLACETEL_USER_KEVIN: ${PLACETEL_USER_KEVIN:-}
      PLACETEL_PASS_KEVIN: ${PLACETEL_PASS_KEVIN:-}
      PLACETEL_USER_MARC: ${PLACETEL_USER_MARC:-}
      PLACETEL_PASS_MARC: ${PLACETEL_PASS_MARC:-}
      PLACETEL_USER_TIMO: ${PLACETEL_USER_TIMO:-}
      PLACETEL_PASS_TIMO: ${PLACETEL_PASS_TIMO:-}
    volumes:
      - crm_data:/data
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - crm

volumes:
  crm_data:
  caddy_data:
  caddy_config:

networks:
  web:
