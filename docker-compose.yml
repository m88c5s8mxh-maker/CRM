services:
  crm:
    build: .
    restart: unless-stopped
    environment:
      PORT: "8000"
      DATA_DIR: /data
      PLIVO_AUTH_ID: ${PLIVO_AUTH_ID:-}
      PLIVO_AUTH_TOKEN: ${PLIVO_AUTH_TOKEN:-}
      PLIVO_PHONE_NUMBER: ${PLIVO_PHONE_NUMBER:-}
      PLIVO_USER_TYRONE: ${PLIVO_USER_TYRONE:-}
      PLIVO_PASS_TYRONE: ${PLIVO_PASS_TYRONE:-}
      PLIVO_USER_KEVIN: ${PLIVO_USER_KEVIN:-}
      PLIVO_PASS_KEVIN: ${PLIVO_PASS_KEVIN:-}
      PLIVO_USER_MARC: ${PLIVO_USER_MARC:-}
      PLIVO_PASS_MARC: ${PLIVO_PASS_MARC:-}
      PLIVO_USER_TIMO: ${PLIVO_USER_TIMO:-}
      PLIVO_PASS_TIMO: ${PLIVO_PASS_TIMO:-}
    volumes:
      - crm_data:/data
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - crm

volumes:
  crm_data:
  caddy_data:
  caddy_config:

networks:
  web:
